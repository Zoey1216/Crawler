name: Crawler App CI Pipeline

# 設定觸發條件：當程式碼 push 到 main 分支時啟動
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # 指定執行自動化任務的虛擬機環境
    runs-on: ubuntu-latest

    steps:
      # 步驟 1：取得 GitHub 上的最新程式碼
      - name: Check out the repository
        uses: actions/checkout@v3

      # 步驟 2：登入 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 步驟 3：建立 Docker Image 並推送到 Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 標籤名稱設定為：您的帳號/crawler-app:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/crawler-app:latest